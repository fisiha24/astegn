<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratory Plan - ASTEGN AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #ffffff;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        nav {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.06);
            padding: 15px 25px;
            border-radius: 50px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        nav a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 500;
            transition: 0.3s;
            font-size: 0.95rem;
        }
        nav a:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: rgba(255,255,255,0.5); margin-bottom: 25px; }
        fieldset {
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        legend { font-weight: bold; color: #4facfe; padding: 0 10px; }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-grid input, .form-grid textarea {
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 15px;
            width: 100%;
        }
        .form-grid input::placeholder, .form-grid textarea::placeholder { color: rgba(255,255,255,0.3); }
        .form-grid input:focus, .form-grid textarea:focus {
            outline: none;
            border-color: rgba(79,172,254,0.4);
            background: rgba(255,255,255,0.08);
        }
        .form-grid textarea { resize: vertical; min-height: 50px; }
        .full-width { grid-column: span 2; }
        .experiment-entry {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .experiment-entry input {
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 6px;
            background: rgba(255,255,255,0.04);
            color: #fff;
            font-size: 14px;
            width: 100%;
        }
        .experiment-entry input::placeholder { color: rgba(255,255,255,0.3); }
        .btn-add {
            padding: 10px 20px;
            background: rgba(79,172,254,0.2);
            color: #4facfe;
            border: 1px solid rgba(79,172,254,0.3);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-add:hover { background: rgba(79,172,254,0.3); }
        .btn-remove {
            padding: 6px 12px;
            background: rgba(231,76,60,0.2);
            color: #e74c3c;
            border: 1px solid rgba(231,76,60,0.3);
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-remove:hover { background: rgba(231,76,60,0.3); }
        .btn {
            padding: 14px 30px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.02); box-shadow: 0 8px 30px rgba(79,172,254,0.3); }
        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px 0;
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
        }
        .footer span {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        @media (max-width: 700px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .experiment-entry { grid-template-columns: 1fr; }
            .card { padding: 20px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="/">🏠 Home</a>
            <a href="/about">ℹ️ About</a>
            <a href="/contact">📧 Contact</a>
            <a href="/register">📝 Register</a>
        </nav>

        <div class="card">
            <h1>🔬 Laboratory Plan</h1>
            <p class="subtitle">Create a complete laboratory experiment plan.</p>

            <form method="POST">
                <!-- Basic Information -->
                <fieldset>
                    <legend>Basic Information</legend>
                    <div class="form-grid">
                        <input type="text" name="school_name" placeholder="School Name" required>
                        <input type="text" name="teacher_name" placeholder="Teacher Name" required>
                        <input type="text" name="subject" placeholder="Subject" required>
                        <input type="number" name="grade" placeholder="Grade" required>
                        <input type="number" name="year" placeholder="Academic Year" required>
                    </div>
                </fieldset>

                <!-- Experiments -->
                <fieldset>
                    <legend>Experiments</legend>
                    <div id="experiment-entries">
                        <div class="experiment-entry">
                            <input type="text" name="exp_number[]" placeholder="Experiment No." required>
                            <input type="text" name="exp_title[]" placeholder="Title" required>
                            <input type="text" name="apparatus[]" placeholder="Apparatus" required>
                            <input type="text" name="chemicals[]" placeholder="Chemicals" required>
                            <input type="number" name="unit_number[]" placeholder="Unit No." required>
                            <input type="text" name="page[]" placeholder="Page" required>
                            <input type="text" name="month[]" placeholder="Month" required>
                            <input type="date" name="date[]" placeholder="Date">
                            <button type="button" class="btn-remove" onclick="this.parentElement.remove()">🗑️ Remove</button>
                        </div>
                    </div>
                    <button type="button" class="btn-add" onclick="addExperimentEntry()"><i>➕</i> Add Experiment</button>
                </fieldset>

                <button type="submit" class="btn"><i class="fas fa-save"></i> Create Laboratory Plan</button>
            </form>
        </div>

        <div class="footer">
            &copy; 2026 <span>ASTEGN AI</span> | Free AI Tutor for Ethiopian Students & Teachers
        </div>
    </div>

    <script>
        function addExperimentEntry() {
            const container = document.getElementById('experiment-entries');
            const entry = document.createElement('div');
            entry.className = 'experiment-entry';
            entry.innerHTML = `
                <input type="text" name="exp_number[]" placeholder="Experiment No." required>
                <input type="text" name="exp_title[]" placeholder="Title" required>
                <input type="text" name="apparatus[]" placeholder="Apparatus" required>
                <input type="text" name="chemicals[]" placeholder="Chemicals" required>
                <input type="number" name="unit_number[]" placeholder="Unit No." required>
                <input type="text" name="page[]" placeholder="Page" required>
                <input type="text" name="month[]" placeholder="Month" required>
                <input type="date" name="date[]" placeholder="Date">
                <button type="button" class="btn-remove" onclick="this.parentElement.remove()">🗑️ Remove</button>
            `;
            container.appendChild(entry);
        }
    </script>
</body>
</html>
